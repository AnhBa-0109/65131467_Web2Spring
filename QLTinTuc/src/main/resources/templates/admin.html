<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - QLTinTuc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f4f7f6; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            background: #2c3e50;
            color: white;
            padding-top: 20px;
            z-index: 100;
        }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-link-custom { 
            cursor: pointer; 
            padding: 12px 20px;
            display: block;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }
        .nav-link-custom:hover, .nav-link-custom.active { 
            background: rgba(255,255,255,0.1); 
            color: white; 
        }
        .btn-action { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
        .hidden-section { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <div class="nav-menu">
        <a onclick="showSection('news-section')" id="nav-news" class="nav-link-custom active">
            <i class="bi bi-newspaper me-2"></i> Quản lý tin tức
        </a>
        <a onclick="showSection('category-section')" id="nav-category" class="nav-link-custom">
            <i class="bi bi-tags me-2"></i> Quản lý loại tin
        </a>
        <hr>
        <a th:href="@{/}" class="nav-link-custom">
            <i class="bi bi-house-door me-2"></i> Xem trang chủ
        </a>
    </div>
</div>

<div class="main-content">
    
    <div id="news-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark">Quản lý Tin tức</h3>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newsModal">
                <i class="bi bi-plus-lg me-1"></i> Thêm tin mới
            </button>
        </div>
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Tiêu đề</th>
                            <th>Loại tin</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tin : ${dsTinTuc}">
                            <td class="ps-4" th:text="${tin.id}">1</td>
                            <td class="fw-bold" th:text="${tin.name}">Tiêu đề</td>
                            <td><span class="badge bg-info text-dark" th:text="${tin.loaiTT.name}">Loại</span></td>
                            <td class="text-end pe-4">
                                <a th:href="@{'/admin/edit/' + ${tin.id}}" class="btn btn-outline-warning btn-action me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{'/admin/delete/' + ${tin.id}}" class="btn btn-outline-danger btn-action" onclick="return confirm('Xóa tin này?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="category-section" class="hidden-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark">Quản lý Loại tin tức</h3>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#categoryModal">
                <i class="bi bi-plus-lg me-1"></i> Thêm loại mới
            </button>
        </div>
        <div class="card col-md-8">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Tên loại tin</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="loai : ${dsLoai}">
                            <td class="ps-4" th:text="${loai.id}">1</td>
                            <td class="fw-bold" th:text="${loai.name}">Kinh tế</td>
                            <td class="text-end pe-4">
                                <a th:href="@{'/admin/loai/edit/' + ${loai.id}}" class="btn btn-outline-warning btn-action me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{'/admin/loai/delete/' + ${loai.id}}" class="btn btn-outline-danger btn-action" onclick="return confirm('Xóa loại này sẽ mất hết tin liên quan! Bạn chắc chứ?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form th:action="@{/admin/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Thông tin tin tức</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại tin</label>
                        <select name="loaiTT.id" class="form-select" required>
                            <option th:each="loai : ${dsLoai}" th:value="${loai.id}" th:text="${loai.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nội dung</label>
                        <textarea name="content" class="form-control" rows="5"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Lưu tin</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/loai/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Thêm Loại Tin Tức</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên loại tin</label>
                        <input type="text" name="name" class="form-control" placeholder="VD: Thể thao, Pháp luật..." required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Lưu loại tin</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Hàm chuyển đổi qua lại giữa News và Category
    function showSection(sectionId) {
        document.getElementById('news-section').classList.add('hidden-section');
        document.getElementById('category-section').classList.add('hidden-section');
        document.getElementById('nav-news').classList.remove('active');
        document.getElementById('nav-category').classList.remove('active');
        
        document.getElementById(sectionId).classList.remove('hidden-section');
        if(sectionId === 'news-section') document.getElementById('nav-news').classList.add('active');
        else document.getElementById('nav-category').classList.add('active');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
