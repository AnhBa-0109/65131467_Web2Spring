<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản Lý Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f4f7f6; }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            background: #2c3e50;
            color: white;
            padding-top: 20px;
        }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table thead { background-color: #f8f9fa; }
        .btn-action { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <div class="list-group list-group-flush">
        <a href="#" class="list-group-item list-group-item-action bg-transparent text-white active">
            <i class="bi bi-newspaper me-2"></i> Quản lý tin tức
        </a>
        <a href="#" class="list-group-item list-group-item-action bg-transparent text-white">
            <i class="bi bi-tags me-2"></i> Loại tin tức
        </a>
        <a th:href="@{/}" class="list-group-item list-group-item-action bg-transparent text-white border-top mt-5">
            <i class="bi bi-box-arrow-left me-2"></i> Xem trang chủ
        </a>
    </div>
</div>

<div class="main-content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">Danh sách tin tức</h3>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newsModal">
                <i class="bi bi-plus-lg me-1"></i> Thêm tin mới
            </button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Tiêu đề</th>
                            <th>Loại tin</th>
                            <th>Nội dung tóm tắt</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tin : ${dsTinTuc}">
                            <td class="ps-4" th:text="${tin.id}">1</td>
                            <td class="fw-bold" th:text="${tin.name}">Tiêu đề bài viết</td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${tin.loaiTT.name}">Loại</span>
                            </td>
                            <td class="text-muted" th:text="${#strings.abbreviate(tin.content, 50)}">Nội dung...</td>
                            <td class="text-end pe-4">
                                <a th:href="@{'/admin/edit/' + ${tin.id}}" class="btn btn-outline-warning btn-action me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{'/admin/delete/' + ${tin.id}}" 
                                   class="btn btn-outline-danger btn-action"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form th:action="@{/admin/save}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Thông tin tin tức</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề tin tức</label>
                        <input type="text" name="name" class="form-control" placeholder="Nhập tiêu đề..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại tin tức</label>
                        <select name="loaiTT.id" class="form-select" required>
                            <option value="">-- Chọn loại tin --</option>
                            <option th:each="loai : ${dsLoai}" 
                                    th:value="${loai.id}" 
                                    th:text="${loai.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nội dung chi tiết</label>
                        <textarea name="content" class="form-control" rows="5" placeholder="Nhập nội dung bài viết..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-primary px-4">Lưu lại</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
