<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-save { padding: 10px 30px; border-radius: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="card-body">
                    <h3 class="card-title fw-bold text-primary mb-4">
                        <i class="bi bi-pencil-square"></i> Cập nhật tin tức
                    </h3>
                    <hr>
                    
                    <form th:action="@{/admin/save}" th:object="${tinTuc}" method="post">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề bài viết</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tiêu đề..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Loại tin tức</label>
                            <select name="loaiTT.id" class="form-select">
							    <option th:each="l : ${dsLoai}" 
							            th:value="${l.id}" 
							            th:text="${l.name}"
							            th:selected="${l.id == tinTuc.loaiTT.id}">
							    </option>
							</select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea th:field="*{content}" class="form-control" rows="8" placeholder="Viết nội dung tại đây..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/admin}" class="btn btn-outline-secondary px-4 rounded-pill">Quay lại</a>
                            <button type="submit" class="btn btn-primary btn-save shadow">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
