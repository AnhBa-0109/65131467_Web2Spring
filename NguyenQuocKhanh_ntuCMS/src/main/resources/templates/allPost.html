<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
    table {
        margin: auto;
        border: 2px solid black;
        border-collapse: collapse;
        width: 80%;
    }
    
    td, th {
        border: 1px solid black;
        padding: 10px;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header-container p { margin: 5px 0; }

    .sidebar a {
        display: block;
        text-decoration: none;
        color: black;
        background-color: #f0f0f0;
        margin-bottom: 5px;
        padding: 8px;
        border: 1px solid #ccc;
        text-align: center;
        border-radius: 4px;
    }
    .sidebar a:hover {
        background-color: #ddd; 
    }
    .sidebar p { margin: 0; }

    .content-area {
        background-color: #e0e0e0;
        vertical-align: top;
    }

    .footer {
        text-align: center;
    }
</style>
</head>
<body>
    <table>
        <tr>
            <td th:replace="~{header::header}">
            </td>
        </tr>

        <tr>
            <td th:replace="~{SideBar::sidebar}">
            </td>
            <td class="content-area">
		        <table style="width: 100%; border-collapse: collapse;">
			        <thead>
			            <tr style="background-color: #ddd;">
			                <th>ID</th>
			                <th>Title</th>
			                <th>categoryId</th>
			                <th>Thao tác</th>
			            </tr>
			        </thead>
			        <tbody>
			            <tr th:each="p : ${ListPost}">
			                <td th:text="${p.id}"></td>
			                <td th:text="${p.title}"></td>
			                <td th:text="${p.categoryId}">1</td>
			                <td><a href="">view</a> <a href="">delete</a></td>
			            </tr>
			        </tbody>
    			</table>
    		</td>
        </tr>

        <tr>
            <td th:replace="~{footer::footer}">

            </td>
        </tr>
    </table>
</body>
</html>
