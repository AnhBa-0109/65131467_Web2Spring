<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Page</title>
    <style>
        .form-container { width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-submit { background-color: #28a745; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%; }
        .btn-submit:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center;">Thêm Page Mới</h2>
    
    <form th:action="@{/page/save}" method="post">
        
        <div class="form-group">
            <label>Mã Page (ID):</label>
            <input type="text" th:field="*{id}" placeholder="VD: P01" required />
        </div>

        <div class="form-group">
            <label>Tên Page:</label>
            <input type="text" th:field="*{pageName}" placeholder="Nhập tên trang" required />
        </div>

        <div class="form-group">
            <label>Từ khóa (Keywords):</label>
            <input type="text" th:field="*{keyWord}" placeholder="VD: tin tức, công nghệ" />
        </div>

        <div class="form-group">
            <label>Nội dung:</label>
            <textarea th:field="*{Content}" rows="5" placeholder="Nhập nội dung trang"></textarea>
        </div>

        <div class="form-group">
            <label>Page Cha (Parent ID):</label>
            <input type="number" th:field="*{parentPageId}" value="0" />
        </div>

        <button type="submit" class="btn-submit">Lưu Page</button>
    </form>
    
    <div style="margin-top: 10px; text-align: center;">
        <a th:href="@{/page/all}">Quay lại danh sách</a>
    </div>
</div>

</body>
</html>
