<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>NTU Dashboard</title>
<style>
    table {
        margin: auto;
        border: 2px solid black;
        border-collapse: collapse;
        width: 80%;
    }
    
    td {
        border: 1px solid black;
        padding: 10px;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header-container p { margin: 5px 0; }

    .sidebar a {
        display: block;
        text-decoration: none;
        color: black;
        background-color: #f0f0f0;
        margin-bottom: 5px;
        padding: 8px;
        border: 1px solid #ccc;
        text-align: center;
        border-radius: 4px;
    }
    .sidebar a:hover {
        background-color: #ddd; 
    }
    .sidebar p { margin: 0; }

    .content-area {
        background-color: #e0e0e0;
        vertical-align: top;
    }

    .footer {
        text-align: center;
    }
</style>
</head>
<body>
    <table>
        <tr>
            <td colspan="2">
                <div class="header-container">
                    <div>
                        <p style="color:#395CA3"><strong>Trường Đại Học Nha Trang</strong></p>
                        <p style="color:#B96155">Khoa Công Nghệ Thông Tin</p>
                    </div>
                    <div>
                        <p><strong>AnhBa mê Nhựa</strong></p>
                    </div>
                </div>
            </td>
        </tr>

        <tr>
            <td class="sidebar" style="width: 20%;">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/page/all}">Page-List</a>
                <a th:href="@{/page/new}">Page-Addnew</a>
                <a th:href="@{/post/all}">Post-List</a>
                <a href="#">Post-Addnew</a>
            </td>
            <td class="content-area">
	            <div>
	            	<h3>Thông tin sinh viên</h3>
	                <p>Họ tên: Nguyễn Quốc Khánh</p>
	                <p>MSSV: 65131467</p>
	                <p>Lớp: 65.CNTT-CLC</p>
	            </div>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="footer">
                2025 by Student Name - NTUCMS
            </td>
        </tr>
    </table>
</body>
</html>
