<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card" th:if="${tin != null}">
        <div class="card-header bg-dark text-white">
            <h2 th:text="${tin.ten}"></h2>
        </div>
        <div class="card-body">
            <p><strong>Thể loại:</strong> <span th:text="${tin.theLoaiTin.ten}"></span></p>
            <hr>
            <div th:text="${tin.content}" style="white-space: pre-wrap;"></div>
        </div>
        <div class="card-footer">
            <a th:href="@{/home}" class="btn btn-secondary">Quay lại danh sách</a>
        </div>
    </div>
    
    <div th:unless="${tin != null}" class="alert alert-danger">
        Không tìm thấy bài viết này!
    </div>
</body>
</html>
