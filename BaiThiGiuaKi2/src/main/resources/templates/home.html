<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Tin Tức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <h3>Thể loại</h3>
            <div class="list-group">
                <a href="/" class="list-group-item list-group-item-action">Tất cả</a>
                <a th:each="tl : ${listTheLoai}" 
                   th:href="@{'/the-loai/' + ${tl.id}}" 
                   th:text="${tl.ten}" 
                   class="list-group-item list-group-item-action"></a>
            </div>
        </div>

        <div class="col-md-9">
            <h3>Danh sách bài viết</h3>
            <div class="row">
                <div class="col-md-12 mb-3" th:each="t : ${listTin}">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${t.ten}"></h5>
                            <p class="card-text text-truncate" style="max-width: 500px;" th:text="${t.content}"></p>
                            <a th:href="@{'/home/tin/' + ${t.id}}" class="btn btn-primary btn-sm">Xem chi tiết</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
